<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>POE Currency Exchange Dashboard</title>
  <link rel="stylesheet" href="assets/style.css" />
</head>
<body>
  <div id="app">
    <header>
      <div class="header-inner">
        <div class="title-group">
          <h1>POE Currency Exchange</h1>
          <span class="realm-badge">PC · PoE1</span>
        </div>
        <div class="header-meta">
          <span id="last-updated">—</span>
          <span id="countdown"></span>
          <button id="refresh-btn" onclick="loadData(true)">重新整理</button>
          <button id="settings-btn" onclick="openSettings()" title="設定 API 憑證">⚙</button>
        </div>
      </div>
    </header>

    <div class="toolbar">
      <div class="filter-group">
        <label>聯賽</label>
        <select id="league-filter" onchange="renderTable()">
          <option value="">全部</option>
        </select>
      </div>
      <div class="filter-group">
        <label>搜尋交易對</label>
        <input type="text" id="pair-search" placeholder="例如：chaos, divine..." oninput="renderTable()" />
      </div>
      <div class="filter-group">
        <label>排序</label>
        <select id="sort-by" onchange="renderTable()">
          <option value="volume_desc">交易量 (高→低)</option>
          <option value="volume_asc">交易量 (低→高)</option>
          <option value="pair_asc">交易對 (A→Z)</option>
          <option value="ratio_asc">最低比率 (低→高)</option>
        </select>
      </div>
      <div class="filter-group">
        <label>自動刷新</label>
        <select id="refresh-interval">
          <option value="0">關閉</option>
          <option value="5">5 分鐘</option>
          <option value="15">15 分鐘</option>
          <option value="30">30 分鐘</option>
          <option value="60" selected>60 分鐘</option>
        </select>
      </div>
    </div>

    <div id="stats-bar" class="stats-bar"></div>

    <div class="table-wrapper">
      <table id="market-table">
        <thead>
          <tr>
            <th>交易對</th>
            <th>聯賽</th>
            <th class="num">交易量 (賣)</th>
            <th class="num">交易量 (買)</th>
            <th class="num">最低庫存</th>
            <th class="num">最高庫存</th>
            <th class="num">最低比率</th>
            <th class="num">最高比率</th>
          </tr>
        </thead>
        <tbody id="market-body">
          <tr><td colspan="8" class="loading">請先設定 API 憑證 (點右上角 ⚙)</td></tr>
        </tbody>
      </table>
    </div>

    <footer>
      <p>資料來源：<a href="https://www.pathofexile.com/developer/docs/reference#currencyexchange" target="_blank">Path of Exile Currency Exchange API</a></p>
    </footer>
  </div>

  <!-- Settings Modal -->
  <div id="settings-overlay" class="modal-overlay hidden" onclick="closeSettingsOnOverlay(event)">
    <div class="modal">
      <div class="modal-header">
        <h2>API 憑證設定</h2>
        <button class="modal-close" onclick="closeSettings()">✕</button>
      </div>
      <div class="modal-body">
        <p class="modal-hint">
          憑證儲存於瀏覽器 localStorage，不會傳送至任何第三方。<br/>
          請至 <a href="https://www.pathofexile.com/developer/docs/" target="_blank">pathofexile.com/developer</a> 申請 Confidential Client (scope: <code>service:cxapi</code>)。
        </p>
        <div class="form-group">
          <label>Client ID</label>
          <input type="text" id="input-client-id" placeholder="your_client_id" autocomplete="off" />
        </div>
        <div class="form-group">
          <label>Client Secret</label>
          <input type="password" id="input-client-secret" placeholder="your_client_secret" autocomplete="off" />
        </div>
        <div id="settings-error" class="settings-error hidden"></div>
      </div>
      <div class="modal-footer">
        <button class="btn-danger" onclick="clearCredentials()">清除憑證</button>
        <button class="btn-primary" onclick="saveCredentials()">儲存並載入</button>
      </div>
    </div>
  </div>

  <script src="assets/app.js"></script>
</body>
</html>
