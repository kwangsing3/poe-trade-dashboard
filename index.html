<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>POE Trade Dashboard</title>
  <link rel="stylesheet" href="assets/style.css?v=12" />
</head>
<body>
  <div id="app">
    <header>
      <div class="header-inner">
        <div class="title-group">
          <h1>POE Trade Dashboard</h1>
          <span class="realm-badge">PC · PoE1 · Mirage</span>
        </div>
        <div class="header-meta">
          <span id="last-updated">—</span>
          <span id="countdown"></span>
          <button id="refresh-btn" onclick="loadData(true)">重新整理</button>
          <button id="settings-btn" onclick="openSettings()" title="設定 API 憑證">⚙</button>
        </div>
      </div>
    </header>

    <!-- Tab navigation -->
    <nav id="tab-nav" class="tab-nav" role="tablist"></nav>

    <!-- Toolbar (search + refresh) -->
    <div class="toolbar">
      <div class="filter-group">
        <label>搜尋</label>
        <input type="text" id="pair-search" placeholder="搜尋品項名稱..." oninput="renderTabContent()" />
      </div>
      <div class="filter-group">
        <label>自動刷新</label>
        <select id="refresh-interval">
          <option value="0">關閉</option>
          <option value="5">5 分鐘</option>
          <option value="15">15 分鐘</option>
          <option value="30">30 分鐘</option>
          <option value="60" selected>60 分鐘</option>
        </select>
      </div>
      <div id="tab-count" class="tab-count"></div>
    </div>

    <div id="stats-bar" class="stats-bar"></div>

    <main id="content">
      <div id="hero-section"></div>
      <div id="tab-content"></div>
    </main>

    <footer>
      <p>資料來源：<a href="https://pathofexile.tw/developer/docs/reference#currencyexchange" target="_blank">Path of Exile TW Currency Exchange API</a></p>
    </footer>
  </div>

  <!-- Settings Modal -->
  <div id="settings-overlay" class="modal-overlay hidden" onclick="closeSettingsOnOverlay(event)">
    <div class="modal">
      <div class="modal-header">
        <h2>資料來源</h2>
        <button class="modal-close" onclick="closeSettings()">✕</button>
      </div>
      <div class="modal-body">
        <p class="modal-hint">
          即時資料由本地 Python 後端（<code>server.py</code>）透過 pathofexile.tw API 取得。<br/>
          若後端未啟動，請切換為 Demo 模式。
        </p>
      </div>
      <div class="modal-footer">
        <button class="btn-ghost"    onclick="useDemo()">Demo 模式</button>
        <button class="btn-primary"  onclick="useRealData()">即時資料</button>
      </div>
    </div>
  </div>

  <script src="assets/zh-names.js?v=1"></script>
  <script src="assets/app.js?v=21"></script>
</body>
</html>
